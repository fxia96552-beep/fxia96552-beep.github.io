<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录｜一本</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f4ee;
      color: #222;
      line-height: 1.7;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .topline {
      margin-bottom: 48px;
    }

    .back {
      display: inline-block;
      margin-bottom: 24px;
      color: #777;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: #222;
    }

    h1 {
      font-size: 36px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .desc {
      max-width: 620px;
      color: #666;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }

    .text {
      padding: 18px;
    }

    .text h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 500;
    }

    .text p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding-top: 64px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topline">
      <a class="back" href="index.html">← 返回封面</a>
      <h1>目录</h1>
      <p class="desc">
        从一部电影开始，慢慢展开。这里记录同一部电影在不同国家与年份中的海报版本，以及它们如何改变一部电影的气质。
      </p>
    </div>

    <div class="grid">
      <a href="in-the-mood-for-love.html">
        <div class="card">
          <img src="images/香港发行版本2000.jpg" alt="花样年华海报">
          <div class="text">
            <h2>第一章｜花样年华</h2>
            <p>同一部电影，在不同地方的视觉差异</p>
          </div>
        </div>
      </a>

      <div class="card">
        <img src="images/香港2.jpg" alt="coming soon">
        <div class="text">
          <h2>第二章｜未完成</h2>
          <p>下一部电影，还在等待。</p>
        </div>
      </div>
    </div>

    <footer>
      Built as a personal film poster archive.
    </footer>
  </div>
</body>
</html>

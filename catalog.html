<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录｜一本</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f4ee;
      color: #222;
      line-height: 1.7;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .back {
      display: inline-block;
      margin-bottom: 28px;
      color: #777;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: #222;
    }

    h1 {
      font-size: 36px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .desc {
      max-width: 660px;
      color: #666;
      margin: 0 0 64px;
    }

    .module {
      margin-bottom: 72px;
    }

    .module-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0 0 10px;
    }

    .module-desc {
      max-width: 620px;
      color: #666;
      margin: 0 0 28px;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }

    .wide-card img {
      aspect-ratio: 16 / 9;
    }

    .text {
      padding: 18px;
    }

    .text h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 500;
    }

    .text p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding-top: 24px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="container">

    <a class="back" href="index.html">← 返回封面</a>

    <h1>目录</h1>

    <p class="desc">
      这里不是一份完整的电影数据库，而是一份慢慢生长的个人电影记录。
      一部分关于海报如何改变电影的气质，一部分关于最近可以看什么。
    </p>

    <section class="module">
      <h2 class="module-title">电影海报档案</h2>
      <p class="module-desc">
        收集同一部电影在不同国家、年份与发行语境中的海报版本。
      </p>

      <div class="grid">
        <a href="in-the-mood-for-love.html">
          <div class="card">
            <img src="images/香港发行版本2000.jpg" alt="花样年华海报">
            <div class="text">
              <h2>花样年华</h2>
              <p>香港 / 法国 / 国际版本的视觉差异</p>
            </div>
          </div>
        </a>
      </div>
    </section>

    <section class="module">
      <h2 class="module-title">这周看什么</h2>
      <p class="module-desc">
        近期上映、将映或重映电影的小型导览，附预告片、评价入口与简单观看理由。
      </p>

      <div class="grid">
        <a href="what-to-watch.html">
          <div class="card wide-card">
            <img src="images/香港2.jpg" alt="这周看什么">
            <div class="text">
              <h2>本周影讯</h2>
              <p>近期电影、重映片与值得留意的新片</p>
            </div>
          </div>
        </a>
      </div>
    </section>

    <footer>
      Built as a personal film poster archive.
    </footer>

  </div>
</body>
</html>

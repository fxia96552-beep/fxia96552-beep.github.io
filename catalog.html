<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目录｜一本</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f4ee;
      color: #222;
      line-height: 1.7;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .back {
      display: inline-block;
      margin-bottom: 32px;
      color: #777;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: #222;
    }

    h1 {
      font-size: 40px;
      font-weight: 500;
      margin: 0 0 14px;
    }

    .desc {
      max-width: 660px;
      color: #666;
      margin: 0 0 56px;
      font-size: 16px;
    }

    .modules {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 28px;
      align-items: stretch;
    }

    .module {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .module:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.08);
    }

    .module img {
      width: 100%;
      display: block;
      object-fit: cover;
      background: #e6ded2;
    }

    .main-module img {
      aspect-ratio: 16 / 9;
    }

    .side-module img {
      aspect-ratio: 2 / 3;
    }

    .module-text {
      padding: 24px;
    }

    .label {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 13px;
      color: #888;
    }

    .module h2 {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .side-module h2 {
      font-size: 24px;
    }

    .module p {
      margin: 0;
      color: #666;
      font-size: 15px;
    }

    footer {
      margin-top: 72px;
      text-align: center;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .container {
        padding-top: 48px;
      }

      h1 {
        font-size: 36px;
      }

      .modules {
        grid-template-columns: 1fr;
      }

      .main-module img,
      .side-module img {
        aspect-ratio: 16 / 10;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <a class="back" href="index.html">← 返回封面</a>

    <h1>目录</h1>

    <p class="desc">
      这里是这本电子电影杂志的入口。你可以先看看近期有什么电影值得关注，
      也可以进入电影海报鉴赏，慢慢观察一部电影如何在不同地方被重新想象。
    </p>

    <main class="modules">

      <a class="module main-module" href="what-to-watch.html">
        <img src="/images/世界的主人海报.jpg" alt="近期电影看什么">
        <div class="module-text">
          <span class="label">主板块</span>
          <h2>近期电影看什么</h2>
          <p>
            近期上映、将映与重映电影的小型导览。包括预告片、评价入口，
            以及一点个人观看理由。
          </p>
        </div>
      </a>

      <a class="module side-module" href="poster-archive.html">
        <img src="images/香港发行版本2000.jpg" alt="电影海报鉴赏">
        <div class="module-text">
          <span class="label">电影海报</span>
          <h2>电影海报鉴赏</h2>
          <p>
            从一部电影开始，观察它在不同国家、年份与发行语境中的视觉差异。
          </p>
        </div>
      </a>

    </main>

    <footer>
      Built as a personal film magazine.
    </footer>

  </div>
</body>
</html>

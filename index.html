<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一本</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f4ee;
      color: #222;
    }

    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
      box-sizing: border-box;
    }

    .cover img {
      width: 280px;
      max-width: 78vw;
      border-radius: 10px;
      margin-bottom: 32px;
      display: block;
    }

    h1 {
      font-size: 48px;
      font-weight: 500;
      margin: 0 0 16px;
    }

    .intro {
      max-width: 520px;
      font-size: 17px;
      line-height: 1.9;
      color: #555;
      margin: 0 0 40px;
    }

    .enter {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid #cfc7bb;
      border-radius: 999px;
      color: #444;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.5);
    }

    .enter:hover {
      background: #ffffff;
      color: #222;
    }
  </style>
</head>
<body>
  <section class="cover">
    <img src="images/香港发行版本2000.jpg" alt="封面海报">
    <h1>一本</h1>
    <p class="intro">
      这是一个关于电影海报的个人记录。<br>
      我在这里慢慢收集，一部电影在不同地方，被重新想象的样子。
    </p>
    <a class="enter" href="catalog.html">进入</a>
  </section>
</body>
</html>
